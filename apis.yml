apis:
  - aid: ilert:ilert-rest-api
    name: ilert REST API
    description: The ilert REST API provides programmatic access to all platform resources
      including alert sources, alerts, incidents, escalation policies, on-call schedules,
      heartbeat monitors, status pages, event flows, call routing, services, metrics,
      connectors, teams, users, and reporting. Authentication uses bearer token API
      keys. The base URL is https://api.ilert.com.
