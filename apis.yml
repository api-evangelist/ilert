aid: ilert
name: ilert
description: ilert is an AI-first incident management and on-call alerting platform
  that helps IT and DevOps teams manage alert sources, on-call schedules, escalation
  policies, incidents, and notification routing. The platform provides a comprehensive
  REST API for programmatic access to alerts, schedules, escalation policies, heartbeat
  monitors, status pages, event flows, call routing, and 100+ monitoring integrations.
