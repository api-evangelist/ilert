      - jira
      - microsoft_teams_bot
      - microsoft_teams_webhook
      - servicenow
      - slack
      - slack_webhook
      - webhook
      - zendesk
      - discord
      - github
      - topdesk
      - email
      - zapier
      - zammad
      - mattermost
      - zoom_chat
      - dingtalk
      - aws_event_bridge
      - dynamic
      - zabbix
      - automation_rule
      - telegram
      - google_chat_bot
      - google_chat_webhook
    EscalationPolicy:
